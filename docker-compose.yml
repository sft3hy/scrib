services:
  web:
    build: .
    container_name: ai-docgen-web
    ports:
      - "3001:3001"
      - "8502:8502"
    environment:
      # Default to Groq Llama 4 Scout Vision API
      - LLM_API_BASE=https://api.groq.com/openai/v1
      - MODEL_NAME=qwen/qwen3.6-27b
      - GROQ_API_KEY
    volumes:
      - .:/app
      - /app/.venv
      - /app/frontend/dist
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
